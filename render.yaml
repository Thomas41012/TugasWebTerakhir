services:
  - type: web
    name: global-supply-chain
    env: docker
    plan: free
    branch: main
    envVars:
      - key: APP_NAME
        value: "Global Supply Chain Intelligence"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        # Ganti sesuai dengan URL aslimu jika punya custom domain
        value: https://global-supply-chain.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: laravel-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: laravel-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: laravel-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: laravel-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: laravel-db
          property: password
      # Tambahkan env vars lain (seperti API KEY) di dashboard Render nantinya

databases:
  - name: laravel-db
    plan: free
    databaseName: globalsupplychain
    user: render_user
